name: Build Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform_name: macOS Apple Silicon
            asset_name: Subtitle-Converter-macos-arm64.zip
          - runner: macos-15-intel
            platform_name: macOS Intel
            asset_name: Subtitle-Converter-macos-intel.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build app bundle
        run: |
          pyinstaller --noconfirm --windowed --onedir --name "Subtitle Converter" --icon Contents/Resources/AppIcon.icns --paths src app.py

      - name: Archive app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/Subtitle Converter.app" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Attach release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --windowed --onefile --name "Subtitle Converter" --paths src app.py

      - name: Zip build
        shell: pwsh
        run: |
          Compress-Archive -Path 'dist/Subtitle Converter.exe' -DestinationPath 'dist/Subtitle-Converter-windows-x64.zip'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows x64
          path: dist/Subtitle-Converter-windows-x64.zip

      - name: Attach release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Subtitle-Converter-windows-x64.zip
