name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --windowed --onefile --name Subtitle-Converter --paths src app.py

      - name: Zip build
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Subtitle-Converter.exe -DestinationPath dist/Subtitle-Converter-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Subtitle-Converter-windows
          path: dist/Subtitle-Converter-windows.zip

      - name: Attach release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Subtitle-Converter-windows.zip

